# DINOv3 Phase B: Domain Adaptation Config (ViT-Large)
# 注意：Large 模型显存占用大，可能需要减小 batch_size

train:
  dataset_path: ImageFolder:root=./data/images:split=TRAIN
  centering: "sinkhorn_knopp"
  batch_size_per_gpu: 16 # 显存优化: 从 32 降到 16 (如果您的GPU够大可改回32)
  output_dir: "./runs/ssl_vitl16"
  save_every_k_epochs: 10
  OFFICIAL_EPOCH_LENGTH: 2500 # Batch减半，这就翻倍，保持总 Iterations 不变

student:
  arch: "vitl16"
  patch_size: 16
  drop_path_rate: 0.3 # Large 模型需要更强的正则化
  layerscale: 1.0e-5
  drop_path_uniform: true
  pretrained_weights: ""

teacher:
  momentum_teacher: 0.996
  final_momentum_teacher: 1.0
  warmup_teacher_temp: 0.04
  teacher_temp: 0.07
  warmup_teacher_temp_epochs: 30

optim:
  epochs: 16
  weight_decay: 0.04
  lr: 1.5e-4
  warmup_epochs: 0.4
  min_lr: 1.0e-6
  clip_grad: 3.0
  freeze_last_layer_epochs: 1
  scaling_rule: sqrt_wrt_1024

crops:
  local_crops_number: 8
  local_crops_scale: [0.05, 0.4]
  global_crops_scale: [0.4, 1.0]
  local_crops_size: 96
  global_crops_size: 224

ibot:
  loss_weight: 1.0
  mask_sample_probability: 0.5
  separate_head: true